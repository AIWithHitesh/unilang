appId: org.unilang.ide
productName: UniLang IDE
copyright: Copyright (c) 2026 UniLang Contributors

directories:
  output: dist/
  buildResources: build/

files:
  - src/**/*
  - package.json

mac:
  category: public.app-category.developer-tools
  target:
    - target: dmg
      arch:
        - arm64
    - target: zip
      arch:
        - arm64

dmg:
  writeUpdateInfo: false

win:
  target:
    - target: nsis
      arch:
        - x64

nsis:
  oneClick: true
  perMachine: false

linux:
  target:
    - AppImage
  category: Development
  maintainer: UniLang Contributors

publish: null
